run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  exclude-use-default: true
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - vendor
    - node_modules
    - dist
