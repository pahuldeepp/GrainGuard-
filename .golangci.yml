run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - gosec
    - prealloc
    - bodyclose
    - noctx
    - exhaustive
  disable:
    - depguard

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - ifElseChain
      - exitAfterDefer
      - hugeParam
      - rangeValCopy
      - sloppyReassign
      - sprintfQuotedString
  gosec:
    excludes:
      - G104  # unhandled errors in deferred calls (noisy)
      - G404  # math/rand is acceptable here for jitter and synthetic test data
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-use-default: true
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - vendor
    - node_modules
    - dist
