version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gocritic
    - gosec
    - prealloc
    - bodyclose
    - noctx
    - exhaustive
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - ifElseChain
        - exitAfterDefer
        - hugeParam
        - rangeValCopy
        - sloppyReassign
        - sprintfQuotedString
    gosec:
      excludes:
        - G104  # unhandled errors in deferred calls (noisy)
        - G404  # math/rand is acceptable here for jitter and synthetic test data
        - G101  # dev-default connection strings are not real credentials
        - G118  # background context in long-lived goroutines is intentional
    exhaustive:
      default-signifies-exhaustive: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    # defer x.Close() returning an error is idiomatic Go for cleanup paths;
    # suppressing globally is standard practice.
    - linters: [errcheck]
      source: "defer "
