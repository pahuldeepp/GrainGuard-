name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─── Go services ─────────────────────────────────────────
  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy — run 'go mod tidy' and commit" && exit 1)

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -short ./...

  # ─── TypeScript services ─────────────────────────────────
  typescript:
    name: TypeScript Build & Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - apps/gateway
          - apps/bff
          - apps/dashboard
          - apps/jobs-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci --ignore-scripts || npm install

      - name: Type check
        working-directory: ${{ matrix.service }}
        run: npx tsc --noEmit 2>&1 || echo "::warning::TypeScript errors in ${{ matrix.service }}"

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: npx eslint . --max-warnings=0 2>&1 || echo "::warning::Lint warnings in ${{ matrix.service }}"
