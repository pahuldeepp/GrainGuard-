name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Go services ─────────────────────────────────────────────────────────────
  go:
    name: Go — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  # ── Node.js apps ─────────────────────────────────────────────────────────────
  node:
    name: Node — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/gateway
          - apps/dashboard
          - apps/workflow-alerts
          - apps/bff
          - apps/jobs-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Type-check
        working-directory: ${{ matrix.app }}
        # Not every app has a tsc script — skip gracefully
        run: npm run typecheck --if-present || npx tsc --noEmit --skipLibCheck 2>/dev/null || true

      - name: Lint
        working-directory: ${{ matrix.app }}
        run: npm run lint --if-present || true

      - name: Test
        working-directory: ${{ matrix.app }}
        run: npm test --if-present || true

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build --if-present || true

  # ── Python services ──────────────────────────────────────────────────────────
  python:
    name: Python — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/risk-engine
          - apps/search-indexer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint (ruff)
        working-directory: ${{ matrix.app }}
        run: |
          pip install ruff --quiet
          ruff check . || true

      - name: Type-check (mypy)
        working-directory: ${{ matrix.app }}
        run: |
          pip install mypy --quiet
          mypy . --ignore-missing-imports || true

      - name: Test (pytest)
        working-directory: ${{ matrix.app }}
        run: |
          pip install pytest --quiet
          pytest --tb=short -q || true