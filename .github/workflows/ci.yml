name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup go
              uses: actions/setup-go@v5
              with:
                go-version: '1.24'
                cache: true
            
            - name: Download dependencies
              run: go mod download
            
            - name: Build
              run: go build ./...
            
            - name: vet
              run: go vet ./...
            
            - name: Test
              run: go test -race -count=1 ./...