name: Terraform

on:
  pull_request:
    branches: [master]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [master]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"

jobs:
  # ── Plan — runs on every PR that touches terraform/ ────────────────────────
  plan:
    name: Terraform Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      matrix:
        env: [dev, prod]
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ matrix.env }}

    permissions:
      id-token: write       # for OIDC auth to AWS (no long-lived keys)
      contents: read
      pull-requests: write  # to post plan output as PR comment

    steps:
      - uses: actions/checkout@v4

      - name: Check Terraform AWS role
        id: aws_role
        run: |
          if [ -n "${{ secrets.AWS_TF_ROLE_ARN }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when Terraform AWS role is not configured
        if: steps.aws_role.outputs.configured != 'true'
        run: echo "Skipping Terraform plan because AWS_TF_ROLE_ARN is not configured."

      - name: Configure AWS credentials (OIDC)
        if: steps.aws_role.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        if: steps.aws_role.outputs.configured == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.aws_role.outputs.configured == 'true'
        run: terraform init -input=false

      - name: Terraform Format check
        if: steps.aws_role.outputs.configured == 'true'
        run: terraform fmt -check -recursive ../../

      - name: Terraform Validate
        if: steps.aws_role.outputs.configured == 'true'
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: steps.aws_role.outputs.configured == 'true'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true   # we post the plan even if it fails

      - name: Post plan as PR comment
        if: steps.aws_role.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/environments/${{ matrix.env }}/plan.txt', 'utf8');
            const body = `## Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`hcl\n${plan.slice(0, 65000)}\n\`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.aws_role.outputs.configured == 'true' && steps.plan.outcome == 'failure'
        run: exit 1

  # ── Apply — runs only on push to master (after PR merged) ──────────────────
  apply:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    environment: dev               # requires manual approval in GitHub Environments
    defaults:
      run:
        working-directory: infra/terraform/environments/dev

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check Terraform AWS role
        id: aws_role
        run: |
          if [ -n "${{ secrets.AWS_TF_ROLE_ARN }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when Terraform AWS role is not configured
        if: steps.aws_role.outputs.configured != 'true'
        run: echo "Skipping Terraform apply because AWS_TF_ROLE_ARN is not configured."

      - name: Configure AWS credentials (OIDC)
        if: steps.aws_role.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        if: steps.aws_role.outputs.configured == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.aws_role.outputs.configured == 'true'
        run: terraform init -input=false

      - name: Terraform Apply
        if: steps.aws_role.outputs.configured == 'true'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform apply -input=false -auto-approve
