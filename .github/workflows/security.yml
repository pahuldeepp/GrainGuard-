name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Full scan every Monday 03:00 UTC
    - cron: '0 3 * * 1'

jobs:
  # ── Trivy — container image vulnerability scan ───────────────────────────
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      matrix:
        service:
          - gateway
          - bff
          - telemetry-service
          - read-model-builder
          - saga-orchestrator
          - risk-engine
          - workflow-alerts
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f apps/${{ matrix.service }}/Dockerfile \
            -t grainguard/${{ matrix.service }}:${{ github.sha }} \
            .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: grainguard/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          trivy-config: infra/security/trivy.yaml

      - name: Ensure Trivy SARIF exists
        if: always()
        run: |
          if [ ! -f "trivy-${{ matrix.service }}.sarif" ]; then
            printf '{"version":"2.1.0","runs":[]}\n' > "trivy-${{ matrix.service }}.sarif"
          fi

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ── Trivy — filesystem + secrets scan ────────────────────────────────────
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem for secrets and misconfigs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          trivy-config: infra/security/trivy.yaml

      - name: Ensure Trivy filesystem SARIF exists
        if: always()
        run: |
          if [ ! -f trivy-fs.sarif ]; then
            printf '{"version":"2.1.0","runs":[]}\n' > trivy-fs.sarif
          fi

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ── CodeQL — static analysis ──────────────────────────────────────────────
  codeql:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [javascript, go, python]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Setup Node
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

  # ── SBOM — software bill of materials ────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: grainguard-sbom-${{ github.sha }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

  # ── Dependency audit ──────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit Node dependencies
        run: |
          for dir in apps/gateway apps/bff apps/workflow-alerts apps/jobs-worker; do
            if [ -f "$dir/package.json" ]; then
              echo "=== Auditing $dir ==="
              cd $dir && npm audit --audit-level=high && cd -
            fi
          done

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Audit Go dependencies (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit Python dependencies (safety)
        run: |
          pip install safety
          for dir in apps/risk-engine apps/search-indexer; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "=== Auditing $dir ==="
              safety check -r $dir/requirements.txt
            fi
          done
