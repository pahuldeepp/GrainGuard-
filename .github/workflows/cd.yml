name: CD

on:
  push:
    branches: ["master"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/pahuldeepp/grainguard

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: read-model-builder
            dockerfile: apps/read-model-builder/Dockerfile
          - name: telemetry-service
            dockerfile: apps/telemetry-service/Dockerfile
          - name: saga-orchestrator
            dockerfile: apps/saga-orchestrator/Dockerfile
          - name: cdc-transformer
            dockerfile: apps/cdc-transformer/Dockerfile
          - name: dlq-reprocessor
            dockerfile: apps/dlq-reprocessor/Dockerfile
          - name: bff
            dockerfile: apps/bff/Dockerfile
          - name: gateway
            dockerfile: apps/gateway/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build & Vet
        run: |
          go build ./...
          go vet ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max