  port: 8087
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 60
  pdb:
    enabled: true
    minAvailable: 2

# ─── Ingress ───────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: grainguard.local
      paths:
        - path: /graphql
          pathType: Prefix
          service: gateway
          port: 3000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 80
  tls: []

# ─── Secrets (override per environment) ───────────────────────────
secrets:
  existingSecret: grainguard-secrets   # K8s secret name containing all creds

# ─── Infra dependencies (managed externally) ──────────────────────
postgresql:
  host: postgres
  port: 5432
  database: grainguard
  secretKey: POSTGRES_URL

redis:
  host: redis
  port: 6379
  secretKey: REDIS_URL

kafka:
  brokers: kafka:9092

rabbitmq:
  host: rabbitmq
  port: 5672
  secretKey: RABBITMQ_URL

elasticsearch:
  host: elasticsearch
  port: 9200
