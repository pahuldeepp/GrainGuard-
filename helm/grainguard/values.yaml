# Global settings inherited by all services
global:
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  env: base

# ─── Service toggles ───────────────────────────────────────────────
services:
  gateway:       { enabled: true }
  bff:           { enabled: true }
  dashboard:     { enabled: true }
  telemetryIngest: { enabled: true }
  assetRegistry: { enabled: true }
  riskEngine:    { enabled: true }
  workflowAlerts: { enabled: true }
  searchIndexer: { enabled: true }
  jobsWorker:    { enabled: true }
  readModelBuilder: { enabled: true }
  cdcTransformer: { enabled: true }
  sagaOrchestrator: { enabled: true }
  ingestService: { enabled: true }

# ─── Gateway ───────────────────────────────────────────────────────
gateway:
  image:
    repository: your-registry/grainguard-gateway
    tag: latest
  replicaCount: 2
  port: 3000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  env:
    NODE_ENV: production
    PORT: "3000"

# ─── BFF ───────────────────────────────────────────────────────────
bff:
  image:
    repository: your-registry/grainguard-bff
    tag: latest
  replicaCount: 2
  port: 4000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

# ─── Dashboard ─────────────────────────────────────────────────────
dashboard:
  image:
    repository: your-registry/grainguard-dashboard
    tag: latest
  replicaCount: 2
  port: 80
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  # Static Nginx has no /health — use TCP socket probes
  probeOverride:
    liveness:
      tcpSocket:
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
    readiness:
      tcpSocket:
        port: 80
      initialDelaySeconds: 3
      periodSeconds: 5

# ─── Telemetry Ingest (Go) ─────────────────────────────────────────
telemetryIngest:
