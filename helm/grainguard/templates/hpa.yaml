{{- range $svcName, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $cfg := index $.Values $svcName | default dict }}
{{- if and $cfg $cfg.hpa $cfg.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svcName }}-hpa
  namespace: {{ $.Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svcName }}
  minReplicas: {{ $cfg.hpa.minReplicas }}
  maxReplicas: {{ $cfg.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
{{- end }}
