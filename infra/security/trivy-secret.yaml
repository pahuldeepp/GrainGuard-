# Trivy secret scanning rules — patterns to detect leaked credentials
rules:
  - id: grainguard-jwt-secret
    category: general
    title: GrainGuard JWT Secret
    severity: CRITICAL
    regex: "JWT_SECRET\s*=\s*['\"]?[A-Za-z0-9+/]{32,}['\"]?"
    keywords:
      - JWT_SECRET

  - id: grainguard-db-password
    category: general
    title: GrainGuard Database Password
    severity: CRITICAL
    regex: "DATABASE_URL\s*=\s*postgres://[^:]+:[^@]{8,}@"
    keywords:
      - DATABASE_URL

  - id: grainguard-redis-password
    category: general
    title: GrainGuard Redis Password
    severity: HIGH
    regex: "REDIS_URL\s*=\s*redis://[^:]+:[^@]{6,}@"
    keywords:
      - REDIS_URL
