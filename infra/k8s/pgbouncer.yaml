# PgBouncer Deployment — Write Pool
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grainguard-grainguard-pgbouncer-write
  namespace: grainguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grainguard-grainguard-pgbouncer-write
  template:
    metadata:
      labels:
        app: grainguard-grainguard-pgbouncer-write
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.22.0
          ports:
            - containerPort: 5432
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: grainguard-secrets
                  key: POSTGRES_WRITE_URL
            - name: POOL_MODE
              value: transaction
            - name: DEFAULT_POOL_SIZE
              value: "50"
            - name: MAX_CLIENT_CONN
              value: "1000"
            - name: MAX_DB_CONNECTIONS
              value: "60"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: grainguard-grainguard-pgbouncer-write
  namespace: grainguard
spec:
  selector:
    app: grainguard-grainguard-pgbouncer-write
  ports:
    - port: 5432
      targetPort: 5432
---
# PgBouncer Deployment — Read Pool
