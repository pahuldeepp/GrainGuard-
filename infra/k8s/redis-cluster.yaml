apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: grainguard
spec:
  serviceName: redis-cluster
  replicas: 6   # 3 masters + 3 replicas
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379   # client
            - containerPort: 16379  # cluster bus (auto = port + 10000)
          command:
            - redis-server
            - --port
            - "6379"
            - --cluster-enabled
            - "yes"
            - --cluster-config-file
            - /data/nodes.conf
            - --cluster-node-timeout
            - "5000"
            - --appendonly
            - "yes"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 600Mi }
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# Headless service — each pod gets its own DNS: redis-cluster-0.redis-cluster
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: grainguard
spec:
  clusterIP: None
  selector:
    app: redis-cluster
  ports:
    - name: client
      port: 6379
    - name: gossip
      port: 16379
---
# Job to bootstrap the cluster after StatefulSet is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-cluster-init
  namespace: grainguard
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: redis-cluster-init
          image: redis:7-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for all Redis pods..."
              for i in 0 1 2 3 4 5; do
                until redis-cli -h redis-cluster-$i.redis-cluster ping 2>/dev/null | grep -q PONG; do
                  echo "Waiting for redis-cluster-$i..."; sleep 3
                done
              done
              echo "Creating cluster..."
              redis-cli --cluster create \
                redis-cluster-0.redis-cluster:6379 \
                redis-cluster-1.redis-cluster:6379 \
                redis-cluster-2.redis-cluster:6379 \
                redis-cluster-3.redis-cluster:6379 \
                redis-cluster-4.redis-cluster:6379 \
                redis-cluster-5.redis-cluster:6379 \
                --cluster-replicas 1 --cluster-yes
