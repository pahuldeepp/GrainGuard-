[databases]
grainguard = host=postgres port=5432 dbname=grainguard
grainguard_read = host=postgres-read port=5432 dbname=grainguard_read

[pgbouncer]
listen_port = 5432
listen_addr = *
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
log_connections = 0
log_disconnections = 0
server_reset_query = DISCARD ALL
