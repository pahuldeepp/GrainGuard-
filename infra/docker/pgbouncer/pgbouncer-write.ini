;; PgBouncer — Write Pool (Postgres Primary)
;; All services that write to Postgres connect here instead of directly.

[databases]
grainguard = host=postgres port=5432 dbname=grainguard

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — connections are returned to pool after each transaction.
; This is the sweet spot: allows prepared statements within a tx, and multiplexes
; 500+ app connections into ~50 real Postgres connections.
pool_mode = transaction

; Pool sizing — the key to scaling
default_pool_size = 50        ; 50 real Postgres connections per database
min_pool_size = 10            ; keep 10 warm at all times
reserve_pool_size = 10        ; emergency overflow
reserve_pool_timeout = 3      ; wait 3s before using reserve

; Limits
max_client_conn = 1000        ; total app connections allowed
max_db_connections = 60       ; hard cap on real Postgres connections

; Timeouts
server_idle_timeout = 300     ; close idle server connections after 5min
client_idle_timeout = 600     ; close idle client connections after 10min
query_timeout = 30            ; kill queries longer than 30s
client_login_timeout = 15     ; login must complete in 15s
server_connect_timeout = 5    ; Postgres must accept in 5s

; Logging
log_connections = 0           ; too noisy in production
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60             ; stats every 60s
admin_users = postgres
