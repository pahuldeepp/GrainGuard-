;; PgBouncer — Read Pool (Postgres Read Replica)
;; All services doing SELECT queries connect here.

[databases]
grainguard_read = host=postgres-read port=5432 dbname=grainguard_read

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction

default_pool_size = 80        ; reads are heavier — more pool connections
min_pool_size = 15
reserve_pool_size = 15
reserve_pool_timeout = 3

max_client_conn = 1500        ; more read clients than write
max_db_connections = 100

server_idle_timeout = 300
client_idle_timeout = 600
query_timeout = 15            ; reads should be fast — 15s max
client_login_timeout = 15
server_connect_timeout = 5

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
admin_users = postgres
