global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "read-model-builder"
    static_configs:
      - targets: ["read-model-builder:2112"]

  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:3000"]
    metrics_path: /metrics

  - job_name: "bff"
    static_configs:
      - targets: ["bff:4000"]
    metrics_path: /metrics
