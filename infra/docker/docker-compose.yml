version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: grainguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grainguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - grainguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grainguard"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-read:
    image: postgres:16-alpine
    container_name: grainguard-postgres-read
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grainguard_read
    ports:
      - "5433:5432"
    volumes:
      - pgdata_read:/var/lib/postgresql/data
    networks:
      - grainguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grainguard_read"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: grainguard-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - grainguard-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7
    container_name: grainguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - grainguard-net

  # 🔥 TELEMETRY SERVICE (gRPC + mTLS) — built from repo root
  telemetry-service:
    build:
      context: ../..
      dockerfile: apps/telemetry-service/Dockerfile
    container_name: grainguard-telemetry
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      WRITE_DB_URL: postgres://postgres:postgres@postgres:5432/grainguard?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      JWKS_URL: http://keycloak:8080/realms/grainguard/protocol/openid-connect/certs
      JWT_ISSUER: http://keycloak:8080/realms/grainguard
      JWT_AUDIENCE: grainguard-api
    volumes:
      - ../certs:/certs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - grainguard-net

  read-model-builder:
    build:
      context: ../..
      dockerfile: apps/read-model-builder/Dockerfile
    container_name: grainguard-read-model-builder
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      READ_DB_URL: postgres://postgres:postgres@postgres-read:5432/grainguard_read?sslmode=disable
      REDIS_ADDR: redis:6379
      METRICS_PORT: "2112"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
    depends_on:
      kafka:
        condition: service_healthy
      postgres-read:
        condition: service_healthy
    ports:
      - "2112:2112"
    networks:
      - grainguard-net

  dlq-reprocessor:
    build:
      context: ../..
      dockerfile: apps/dlq-reprocessor/Dockerfile
    container_name: grainguard-dlq-reprocessor
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - grainguard-net

  gateway:
    build:
      context: ../../apps/gateway
    container_name: grainguard-gateway
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      READ_DATABASE_URL: postgres://postgres:postgres@postgres-read:5432/grainguard_read?sslmode=disable
      GRPC_TARGET: telemetry-service:50051
      JWKS_URL: http://keycloak:8080/realms/grainguard/protocol/openid-connect/certs
      JWT_ISSUER: http://keycloak:8080/realms/grainguard
      JWT_AUDIENCE: grainguard-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - ../certs:/certs
    depends_on:
      - redis
      - postgres-read
      - kafka
      - telemetry-service
      - keycloak
    ports:
      - "8086:3000"
    networks:
      - grainguard-net

  prometheus:
    image: prom/prometheus:latest
    container_name: grainguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - grainguard-net

  grafana:
    image: grafana/grafana:latest
    container_name: grainguard-grafana
    ports:
      - "3000:3000"
    networks:
      - grainguard-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: grainguard-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - grainguard-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    networks:
      - grainguard-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  pgdata:
  pgdata_read:
  kafka-data:

networks:
  grainguard-net:
    driver: bridge
