apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdc-transformer
  namespace: grainguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdc-transformer
  template:
    metadata:
      labels:
        app: cdc-transformer
    spec:
      containers:
        - name: cdc-transformer
          image: ghcr.io/pahuldeepp/grainguard/cdc-transformer:latest
          ports:
            - containerPort: 8081
              name: health
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: CDC_SOURCE_TOPIC
              value: grainguard.public.telemetry_readings
            - name: TARGET_TOPIC
              value: telemetry.events
            - name: KAFKA_GROUP_ID
              value: cdc-transformer
            - name: WORKER_COUNT
              value: "24"
            - name: PUBLISHER_COUNT
              value: "8"
            - name: JOB_QUEUE_SIZE
              value: "4096"
            - name: PUBLISH_QUEUE_SIZE
              value: "4096"
            - name: COMMIT_QUEUE_SIZE
              value: "4096"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cdc-transformer
  namespace: grainguard
spec:
  selector:
    app: cdc-transformer
  ports:
    - name: health
      port: 8081
      targetPort: 8081
