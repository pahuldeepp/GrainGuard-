# redis.yaml
# In-memory cache used by cdc-transformer for event deduplication.
# Before processing any Kafka event, the transformer checks Redis for
# the event ID. If found, the event is skipped. If not, it is processed
# and the ID is written to Redis with a TTL.

apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: grainguard
data:
  REDIS_PORT: "6379"
  REDIS_MAXMEMORY: "256mb"
  REDIS_MAXMEMORY_POLICY: "allkeys-lru"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: grainguard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: grainguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --maxmemory 256mb
            - --maxmemory-policy allkeys-lru
            - --appendonly yes
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - mountPath: /data
              name: redis-storage
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: grainguard
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
