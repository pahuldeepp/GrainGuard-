apiVersion: apps/v1
kind: Deployment
metadata:
  name: read-model-builder
  namespace: grainguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: read-model-builder
  template:
    metadata:
      labels:
        app: read-model-builder
    spec:
      containers:
        - name: read-model-builder
          image: ghcr.io/pahuldeepp/grainguard/read-model-builder:latest
          ports:
            - containerPort: 8081
              name: health
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: telemetry.events
            - name: KAFKA_GROUP_ID
              value: read-model-builder
            - name: READ_DB_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-read-secret
                  key: READ_DB_URL
            - name: REDIS_ADDR
              value: redis:6379
            - name: WORKER_COUNT
              value: "12"
            - name: METRICS_PORT
              value: "2112"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: read-model-builder
  namespace: grainguard
spec:
  selector:
    app: read-model-builder
  ports:
    - name: health
      port: 8081
      targetPort: 8081