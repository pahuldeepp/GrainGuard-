apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: grainguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      containers:
        - name: bff
          image: ghcr.io/pahuldeepp/grainguard/bff:latest
          ports:
            - containerPort: 4000
              name: graphql
          env:
            - name: PORT
              value: "4000"
            - name: READ_DB_HOST
              value: postgres-read
            - name: READ_DB_PORT
              value: "5432"
            - name: READ_DB_NAME
              value: grainguard_read
            - name: READ_DB_USER
              value: postgres
            - name: READ_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-read-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: grainguard
spec:
  selector:
    app: bff
  ports:
    - name: graphql
      port: 4000
      targetPort: 4000
