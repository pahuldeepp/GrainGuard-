apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service
  namespace: grainguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-service
  template:
    metadata:
      labels:
        app: telemetry-service
    spec:
      containers:
        - name: telemetry-service
          image: ghcr.io/pahuldeepp/grainguard/telemetry-service:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8081
              name: health
          env:
            - name: WRITE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: WRITE_DB_URL
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: JWKS_URL
              value: https://dev-dz6bl3nngdeib7ro.us.auth0.com/.well-known/jwks.json
            - name: JWT_ISSUER
              value: https://dev-dz6bl3nngdeib7ro.us.auth0.com/
            - name: JWT_AUDIENCE
              value: https://api.grainguard.com
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-service
  namespace: grainguard
spec:
  selector:
    app: telemetry-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
