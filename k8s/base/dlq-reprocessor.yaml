apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-reprocessor
  namespace: grainguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlq-reprocessor
  template:
    metadata:
      labels:
        app: dlq-reprocessor
    spec:
      containers:
        - name: dlq-reprocessor
          image: ghcr.io/pahuldeepp/grainguard/dlq-reprocessor:latest
          ports:
            - containerPort: 8081
              name: health
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: DLQ_TOPIC
              value: telemetry.events.dlq
            - name: TARGET_TOPIC
              value: telemetry.events
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dlq-reprocessor
  namespace: grainguard
spec:
  selector:
    app: dlq-reprocessor
  ports:
    - name: health
      port: 8081
      targetPort: 8081
