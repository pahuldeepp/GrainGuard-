namespace: grainguard-staging

# Staging environment overrides — production-like topology with slightly
# reduced capacity so we can validate rollouts, ingress, and restores safely.
image:
  registry: 658362403982.dkr.ecr.us-east-1.amazonaws.com/grainguard
  pullPolicy: Always
  tag: staging-bootstrap

services:
  gateway:
    replicaCount: 2
    image:
      tag: staging-bootstrap
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      REDIS_HOST: master.grainguard-staging.2vbpuh.use1.cache.amazonaws.com
      REDIS_PORT: "6379"
      READ_DB_SSL_REJECT_UNAUTHORIZED: "false"
      STRIPE_SECRET_KEY: sk_test_staging_placeholder
      WRITE_DB_SSL_REJECT_UNAUTHORIZED: "false"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8

  bff:
    replicaCount: 2
    image:
      tag: staging-bootstrap
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PORT: "4000"
      REDIS_HOST: master.grainguard-staging.2vbpuh.use1.cache.amazonaws.com
      REDIS_PORT: "6379"
      READ_DB_SSL_REJECT_UNAUTHORIZED: "false"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6

  telemetry-service:
    enabled: false

  saga-orchestrator:
    enabled: false

  read-model-builder:
    enabled: false

  asset-registry:
    enabled: false

  risk-engine:
    enabled: false

  search-indexer:
    enabled: false

  workflow-alerts:
    enabled: false

  jobs-worker:
    enabled: false

  cassandra-writer:
    enabled: false

  cdc-transformer:
    enabled: false

  dlq-reprocessor:
    enabled: false
