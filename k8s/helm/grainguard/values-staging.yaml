namespace: grainguard-staging

# Staging environment overrides — production-like topology with slightly
# reduced capacity so we can validate rollouts, ingress, and restores safely.
image:
  pullPolicy: Always
  tag: staging-bootstrap

services:
  gateway:
    replicaCount: 2
    env:
      REDIS_HOST: master.grainguard-staging.2vbpuh.use1.cache.amazonaws.com
      REDIS_PORT: "6379"
      READ_DB_SSL_REJECT_UNAUTHORIZED: "false"
      WRITE_DB_SSL_REJECT_UNAUTHORIZED: "false"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8

  bff:
    replicaCount: 2
    env:
      PORT: "4000"
      REDIS_HOST: master.grainguard-staging.2vbpuh.use1.cache.amazonaws.com
      REDIS_PORT: "6379"
      READ_DB_SSL_REJECT_UNAUTHORIZED: "false"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6

  telemetry-service:
    enabled: false

  saga-orchestrator:
    enabled: false

  read-model-builder:
    enabled: false

  asset-registry:
    enabled: false

  risk-engine:
    enabled: false

  search-indexer:
    enabled: false

  workflow-alerts:
    enabled: false

  jobs-worker:
    enabled: false

  cassandra-writer:
    enabled: false

  cdc-transformer:
    enabled: false

  dlq-reprocessor:
    enabled: false
