namespace: grainguard

image:
  registry: ghcr.io/pahuldeepp/grainguard
  tag: latest
  pullPolicy: IfNotPresent

# ─── Services ────────────────────────────────────────────────────────────────
services:

  gateway:
    enabled: true
    port: 3000
    healthPort: 8081
    healthPath: /healthz/live
    readinessPath: /healthz/ready
    serviceType: LoadBalancer
    replicaCount: 2
    image:
      tag: latest
    env:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BFF_HOST: bff
      BFF_PORT: "4000"
      GRPC_TARGET: "telemetry-service:50051"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    envFromSecret:
      - name: READ_DATABASE_URL
        secretName: postgres-read-secret
        secretKey: READ_DATABASE_URL
      - name: WRITE_DATABASE_URL
        secretName: postgres-secret
        secretKey: WRITE_DB_URL
      - name: JWKS_URL
        secretName: auth-secret
        secretKey: JWKS_URL
      - name: JWT_ISSUER
        secretName: auth-secret
        secretKey: JWT_ISSUER
      - name: JWT_AUDIENCE
        secretName: auth-secret
        secretKey: JWT_AUDIENCE
      - name: REDIS_PASSWORD
        secretName: redis-secret
        secretKey: REDIS_PASSWORD
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowExternal: true
      allowFromSameNamespace: true
      allowFromServices: []

  bff:
    enabled: true
    port: 4000
    healthPath: /health
    serviceType: ClusterIP
    replicaCount: 2
    image:
      tag: latest
    env:
      PORT: "4000"
      READ_DB_HOST: postgres-read
      READ_DB_PORT: "5432"
      READ_DB_NAME: grainguard_read
      READ_DB_USER: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    envFromSecret:
      - name: READ_DATABASE_URL
        secretName: postgres-read-secret
        secretKey: READ_DATABASE_URL
      - name: READ_DB_PASSWORD
        secretName: postgres-read-secret
        secretKey: POSTGRES_PASSWORD
      - name: JWKS_URL
        secretName: auth-secret
        secretKey: JWKS_URL
      - name: JWT_ISSUER
        secretName: auth-secret
        secretKey: JWT_ISSUER
      - name: JWT_AUDIENCE
        secretName: auth-secret
        secretKey: JWT_AUDIENCE
      - name: REDIS_PASSWORD
        secretName: redis-secret
        secretKey: REDIS_PASSWORD
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowExternal: false
      allowFromSameNamespace: true
      allowFromServices:
        - gateway

  telemetry-service:
    enabled: true
    port: 8081
    grpcPort: 50051
    healthPort: 8081
    healthPath: /healthz/live
    readinessPath: /healthz/ready
    serviceType: ClusterIP
    replicaCount: 2
    image:
      tag: latest
    env:
      KAFKA_BROKERS: "kafka:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    envFromSecret:
      - name: WRITE_DB_URL
        secretName: postgres-secret
        secretKey: WRITE_DB_URL
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowExternal: false
      allowFromSameNamespace: true
      allowFromServices:
        - gateway

  saga-orchestrator:
